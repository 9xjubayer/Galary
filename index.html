<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Gallery Web App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f4);
            color: var(--tg-theme-text-color, #222);
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .user-info {
            background: var(--tg-theme-bg-color, #fff);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .gallery-card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            transition: transform 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
        }
        .gallery-card:active {
            transform: scale(0.98);
        }
        .gallery-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        .card-body {
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="user-info">
        <h5>স্বাগতম, <span id="user-name">ইউজার</span>!</h5>
        <p class="text-muted" style="font-size: 14px;">আপনার আইডি: <span id="user-id">লোড হচ্ছে...</span></p>
    </div>

    <div class="container">
        <div class="row" id="gallery-container">
            <div class="col-6">
                <div class="card gallery-card" onclick="openLink('https://www.google.com')">
                    <img src="https://via.placeholder.com/300x200?text=Site+1" alt="Site 1">
                    <div class="card-body">সাইট ১ দেখুন</div>
                </div>
            </div>

            <div class="col-6">
                <div class="card gallery-card" onclick="openLink('https://www.facebook.com')">
                    <img src="https://via.placeholder.com/300x200?text=Site+2" alt="Site 2">
                    <div class="card-body">সাইট ২ দেখুন</div>
                </div>
            </div>

            <div class="col-6">
                <div class="card gallery-card" onclick="openLink('https://www.youtube.com')">
                    <img src="https://via.placeholder.com/300x200?text=Site+3" alt="Site 3">
                    <div class="card-body">ইউটিউব</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // টেলিগ্রাম ওয়েব অ্যাপ ইনিশিয়ালাইজ
        const tg = window.Telegram.WebApp;
        tg.expand(); // অ্যাপটি ওপেন করলে ফুল স্ক্রিন হবে

        // ইউজার ডাটা দেখানো
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
            document.getElementById('user-id').innerText = user.id;
        } else {
            document.getElementById('user-id').innerText = "পাওয়া যায়নি (ব্রাউজারে আছেন)";
        }

        // লিঙ্ক ওপেন করার ফাংশন
        function openLink(url) {
            tg.openLink(url); // টেলিগ্রামের ভেতরেই লিঙ্ক ওপেন করবে
        }
    </script>
</body>
</html>
