<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Directory App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 15px; overflow: hidden; }

        /* ইউজার কার্ড */
        .header-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            padding: 20px; border-radius: 20px;
            text-align: center; margin-bottom: 25px;
        }
        .user-pic {
            width: 75px; height: 75px; border-radius: 50%;
            background: #38bdf8; margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; font-weight: bold; overflow: hidden;
            border: 3px solid #38bdf8;
        }
        .user-pic img { width: 100%; height: 100%; object-fit: cover; }

        /* ডিরেক্টরি গ্রিড */
        .directory-label { font-size: 12px; text-transform: uppercase; color: #38bdf8; letter-spacing: 1.5px; margin-bottom: 15px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .app-item {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 18px; padding: 25px 15px; text-align: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .app-item:active { transform: scale(0.9); background: #334155; }
        .app-item img { width: 140px; height: 140px; border-radius: 15px; margin-bottom: 12px; transition: 0.3s; }
        .app-item:hover img { transform: scale(1.05); }
        .app-item h3 { font-size: 14px; font-weight: 600; color: #f1f5f9; }

        /* প্রিমিয়াম ফুল-স্ক্রিন লোডার */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 10000;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; opacity: 1; transition: opacity 0.8s ease;
        }
        .progress-container { width: 150px; height: 4px; background: #334155; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .progress-bar { width: 0%; height: 100%; background: #38bdf8; transition: width 3s linear; }
        
        .loading-ring {
            width: 50px; height: 50px; border: 3px solid rgba(56, 189, 248, 0.2);
            border-radius: 50%; border-top-color: #38bdf8;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ভিউ প্যানেল */
        #view-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9998; visibility: hidden;
            opacity: 0; transform: scale(1.1);
            transition: opacity 0.6s ease, transform 0.6s ease, visibility 0.6s;
        }
        #view-panel.active { visibility: visible; opacity: 1; transform: scale(1); }
        
        iframe { width: 100%; height: 100%; border: none; }
        
        .close-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #38bdf8; color: #fff; padding: 12px 35px;
            border-radius: 50px; font-weight: bold; border: none;
            box-shadow: 0 10px 20px rgba(56, 189, 248, 0.4); z-index: 10001;
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="loading-ring"></div>
        <div class="progress-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>
        <p style="margin-top: 10px; font-size: 13px; color: #94a3b8;">লোড হচ্ছে...</p>
    </div>

    <div class="header-card">
    <div class="user-pic" id="p-img">?</div>
    <div class="name-txt" id="p-name">লোডিং...</div>
    <div class="id-txt" id="p-id">ID: 00000000</div>

    <div style="margin-top: 15px;">
        <a href="https://toolszu.com/tools/real-time-website-visitor-counter/" target="_blank" style="text-decoration: none;">
            <img src="https://toolszu.com/tools/real-time-website-visitor-counter/tracker.php?id=60359bbcf14a019f1ea218384295a012fd3ed02b374f8ef37db5ac50bbd930fd" alt="Web Visitor Counter" border="0" style="height: 20px; border-radius: 4px;">
        </a>
    </div>
</div>

    <div class="directory-label">Smart Directory</div>

    <div class="grid">
        <div class="app-item" onclick="openLink('https://ghost-tcp-control-1-rqq4.onrender.com')">
            <img src="https://i.ibb.co.com/WNMbgDPJ/1772269959056.png">
            <h3>TCP V1</h3>
        </div>
        <div class="app-item" onclick="openLink('https://info-ne2j.vercel.app')">
            <img src="https://i.ibb.co.com/cMcxNNp/1772276839706.png">
            <h3>FF PROFILE INFORMATION</h3>
        </div>
        <div class="app-item" onclick="openLink('https://info-ne2j.vercel.app')">
            <img src="https://cdn-icons-png.flaticon.com/512/564/564429.png">
            <h3>Speed Test</h3>
        </div>
        <div class="app-item" onclick="openLink('https://telegram.org')">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
            <h3>Telegram</h3>
        </div>
    </div>

    <div id="view-panel">
        <iframe id="app-iframe" src=""></iframe>
        <button class="close-btn" onclick="closeLink()">BACK TO HOME</button>
    </div>

    <script>
        const webapp = window.Telegram.WebApp;
        webapp.expand();

        const user = webapp.initDataUnsafe?.user;
        if(user) {
            document.getElementById('p-name').innerText = user.first_name;
            document.getElementById('p-id').innerText = "ID: " + user.id;
            if(user.photo_url) {
                document.getElementById('p-img').innerHTML = `<img src="${user.photo_url}">`;
            } else {
                document.getElementById('p-img').innerText = user.first_name[0].toUpperCase();
            }
        }

        function openLink(url) {
            webapp.HapticFeedback.impactOccurred('medium');
            
            const loader = document.getElementById('loader-overlay');
            const pBar = document.getElementById('p-bar');
            const panel = document.getElementById('view-panel');
            const iframe = document.getElementById('app-iframe');

            // ১. লোডার চালু ও প্রগ্রেস বার শুরু
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            setTimeout(() => { pBar.style.width = '100%'; }, 50);

            // ২. আইফ্রেম ব্যাকগ্রাউন্ডে লোড হতে শুরু করবে
            iframe.src = url;

            // ৩. ৩ সেকেন্ড পর ট্রানজিশন
            setTimeout(() => {
                // প্যানেলকে দৃশ্যমান করা (পেছনে)
                panel.classList.add('active');
                
                // লোডারকে ফেড-আউট করা
                loader.style.opacity = '0';
                
                setTimeout(() => {
                    loader.style.display = 'none';
                    pBar.style.width = '0%'; // রিসেট
                }, 800);

                webapp.BackButton.show();
            }, 3000);
        }

        function closeLink() {
            const panel = document.getElementById('view-panel');
            panel.classList.remove('active');
            setTimeout(() => {
                document.getElementById('app-iframe').src = "";
            }, 600);
            webapp.BackButton.hide();
        }

        webapp.BackButton.onClick(closeLink);
    </script>
</body>
</html>
