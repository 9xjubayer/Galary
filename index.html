<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Bot Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            /* কালার প্যালেট: আধুনিক ভাইব্রেন্ট ব্লু ও সায়ান */
            --primary-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --card-gradient: linear-gradient(145deg, #ffffff, #f0f4f8);
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.9);
        }

        /* ডার্ক মোড সাপোর্ট */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --card-gradient: linear-gradient(145deg, #1e293b, #0f172a);
                --text-main: #f1f5f9;
                --text-muted: #94a3b8;
                --glass-bg: rgba(30, 41, 59, 0.95);
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 15px;
            transition: background 0.3s ease;
        }

        /* প্রোফাইল সেকশন - গ্লাস মরফিজম */
        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 28px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .avatar-placeholder {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: var(--primary-gradient);
            color: white;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            box-shadow: 0 8px 20px rgba(58, 123, 213, 0.3);
        }

        .user-name {
            font-size: 1.2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* কার্ড গ্রিড ডিজাইন */
        .section-header {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 15px;
            padding-left: 10px;
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-header::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--text-muted);
            opacity: 0.2;
        }

        .card {
            background: var(--card-gradient);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 20px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.04);
        }

        .card:active {
            transform: scale(0.94);
        }

        .card-img-wrapper {
            position: relative;
            height: 135px;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .card:hover img {
            transform: scale(1.15);
        }

        .card-title {
            padding: 15px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            margin: 0;
            color: var(--text-main);
        }

        /* ওয়েবভিউ ওভারলে */
        #webview-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 10000;
            display: none;
            animation: slideUp 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .close-btn {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(58, 123, 213, 0.4);
            z-index: 10001;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .close-btn:active { transform: translateX(-50%) scale(0.9); }
    </style>
</head>
<body>

    <div id="main-content">
        <div class="profile-card">
            <div id="user-placeholder" class="avatar-placeholder">?</div>
            <h5 class="user-name" id="user-full-name">Guest User</h5>
            <p style="font-size: 12px; color: var(--text-muted); margin-top: 5px;" id="user-telegram-id">ID: 00000000</p>
        </div>

        <div class="section-header">Exclusive Apps</div>

        <div class="container-fluid p-0">
            <div class="row gx-3">
                <div class="col-6">
                    <div class="card" onclick="openLink('https://bing.com')">
                        <div class="card-img-wrapper">
                            <img src="https://images.unsplash.com/photo-1614680376593-902f74cc0d41?w=400" alt="Bing">
                        </div>
                        <p class="card-title">Bing Search</p>
                    </div>
                </div>
                <div class="col-6">
                    <div class="card" onclick="openLink('https://wikipedia.org')">
                        <div class="card-img-wrapper">
                            <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=400" alt="Wiki">
                        </div>
                        <p class="card-title">Wikipedia</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="webview-overlay">
        <iframe id="site-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
        <button class="close-btn" onclick="closeLink()">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            Close View
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ইউজার ডাটা সেটআপ
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-full-name').innerText = user.first_name;
            document.getElementById('user-telegram-id').innerText = 'ID: ' + user.id;
            document.getElementById('user-placeholder').innerText = user.first_name.charAt(0).toUpperCase();
        }

        function openLink(url) {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('site-frame').src = url;
            document.getElementById('webview-overlay').style.display = 'block';
            tg.BackButton.show();
            tg.BackButton.onClick(closeLink);
        }

        function closeLink() {
            document.getElementById('webview-overlay').style.display = 'none';
            document.getElementById('site-frame').src = "";
            tg.BackButton.hide();
        }
    </script>
</body>
</html>
