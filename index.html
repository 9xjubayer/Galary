<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modern Mini App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --main-bg: #0f172a;
            --accent-color: #0ea5e9;
            --secondary-accent: #8b5cf6;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-gradient: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
        }

        body {
            background: var(--main-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* --- Profile Header --- */
        .profile-container {
            background: var(--card-gradient);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar-circle {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--accent-color), var(--secondary-accent));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 10px;
            font-size: 28px; font-weight: 800;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.3);
        }

        /* --- Grid & Cards --- */
        .gallery-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .gallery-card:active { transform: scale(0.95); }

        .card-img-box {
            width: 100%;
            height: 120px; /* উচ্চতা কিছুটা কমানো হয়েছে */
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* এর ফলে ছবি পুরোটা দেখা যাবে, ক্রপ হবে না */
            padding: 10px;
        }

        .card-info {
            padding: 12px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
        }

        .card-info h3 {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Webview Overlay --- */
        #webview-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--main-bg);
            z-index: 10000;
            display: none;
        }

        .floating-back {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: var(--accent-color);
            color: white; border: none;
            padding: 12px 25px; border-radius: 50px;
            font-weight: 700; font-size: 14px;
            z-index: 10001;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div id="user-avatar" class="avatar-circle">?</div>
        <h2 style="font-size: 18px; margin:0;" id="user-name">Welcome</h2>
        <div style="font-size: 11px; color: #94a3b8;" id="user-id">UID: 000000000</div>
    </div>

    <div class="container-fluid p-0">
        <div class="row gx-3">
            
            <div class="col-6">
                <div class="gallery-card" onclick="openApp('https://ghost-tcp-control-1-rqq4.onrender.com')">
                    <div class="card-img-box">
                        <img src="https://icy-gold-ypgtxym1rg.edgeone.app/1772213612136.png" alt="TCP">
                    </div>
                    <div class="card-info"><h3>TCP V1</h3></div>
                </div>
            </div>

            <div class="col-6">
                <div class="gallery-card" onclick="openApp('https://wikipedia.org')">
                    <div class="card-img-box">
                        <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?w=400" alt="Wiki">
                    </div>
                    <div class="card-info"><h3>Wikipedia</h3></div>
                </div>
            </div>

        </div>
    </div>

    <div id="webview-overlay">
        <iframe id="app-frame" src="" style="width:100%; height:100%; border:none;"></iframe>
        <button class="floating-back" onclick="closeApp()">BACK TO HOME</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name;
            document.getElementById('user-id').innerText = 'ID: ' + user.id;
            document.getElementById('user-avatar').innerText = user.first_name.charAt(0).toUpperCase();
        }

        function openApp(url) {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('app-frame').src = url;
            document.getElementById('webview-overlay').style.display = 'block';
            tg.BackButton.show();
            tg.BackButton.onClick(closeApp);
        }

        function closeApp() {
            document.getElementById('webview-overlay').style.display = 'none';
            document.getElementById('app-frame').src = "";
            tg.BackButton.hide();
        }

        tg.ready();
    </script>
</body>
</html>
