<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Directory App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* বেসিক স্টাইল */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 15px; overflow-x: hidden; }

        /* ইউজার কার্ড */
        .header-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid #334155;
            padding: 20px; border-radius: 20px;
            text-align: center; margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .user-pic {
            width: 75px; height: 75px; border-radius: 50%;
            background: #38bdf8; margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; font-weight: bold; overflow: hidden;
            border: 3px solid #38bdf8;
        }
        .user-pic img { width: 100%; height: 100%; object-fit: cover; }

        /* গ্রিড ডিজাইন */
        .directory-label { font-size: 12px; text-transform: uppercase; color: #38bdf8; letter-spacing: 1.5px; margin-bottom: 15px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }

        .app-item {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 18px; padding: 25px 15px; text-align: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }
        .app-item:active { transform: scale(0.9); background: #334155; }
        .app-item img { width: 65px; height: 65px; border-radius: 14px; margin-bottom: 12px; }
        .app-item h3 { font-size: 14px; font-weight: 600; color: #f1f5f9; }

        /* প্রিমিয়াম লোডার */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0f172a; z-index: 10000;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; transition: 0.5s;
        }
        .loading-ring {
            width: 50px; height: 50px; border: 3px solid transparent;
            border-radius: 50%; border-top-color: #38bdf8;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loader-text { margin-top: 15px; font-size: 14px; color: #94a3b8; letter-spacing: 1px; }

        /* ফুল স্ক্রিন ভিউ প্যানেল (Fade-in ইফেক্ট সহ) */
        #view-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: none;
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        #view-panel.show { display: block; opacity: 1; transform: translateY(0); }
        
        iframe { width: 100%; height: 100%; border: none; }
        
        .close-overlay {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(56, 189, 248, 0.9); backdrop-filter: blur(5px);
            color: #fff; padding: 14px 35px; border-radius: 50px;
            font-weight: bold; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loading-ring"></div>
        <div class="loader-text">প্রবেশ করা হচ্ছে...</div>
    </div>

    <div class="header-card">
        <div class="user-pic" id="p-img">?</div>
        <div class="name-txt" id="p-name">লোডিং...</div>
        <div class="id-txt" id="p-id">ID: 00000000</div>
    </div>

    <div class="directory-label">Smart Directory</div>

    <div class="grid">
        <div class="app-item" onclick="openLink('https://ghost-tcp-control-1-rqq4.onrender.com')">
            <img src="https://i.ibb.co.com/WNMbgDPJ/1772269959056.png">
            <h3>TCP V1</h3>
        </div>
        <div class="app-item" onclick="openLink('https://wikipedia.org')">
            <img src="https://cdn-icons-png.flaticon.com/512/38/38401.png">
            <h3>Wikipedia</h3>
        </div>
        <div class="app-item" onclick="openLink('https://fast.com')">
            <img src="https://cdn-icons-png.flaticon.com/512/564/564429.png">
            <h3>Speed Test</h3>
        </div>
        <div class="app-item" onclick="openLink('https://telegram.org')">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
            <h3>Telegram</h3>
        </div>
    </div>

    <div id="view-panel">
        <iframe id="app-iframe" src=""></iframe>
        <button class="close-overlay" onclick="closeLink()">BACK TO HOME</button>
    </div>

    <script>
        const webapp = window.Telegram.WebApp;
        webapp.expand();

        // ইউজার ডাটা
        const user = webapp.initDataUnsafe?.user;
        if(user) {
            document.getElementById('p-name').innerText = user.first_name;
            document.getElementById('p-id').innerText = "ID: " + user.id;
            if(user.photo_url) {
                document.getElementById('p-img').innerHTML = `<img src="${user.photo_url}">`;
            } else {
                document.getElementById('p-img').innerText = user.first_name[0].toUpperCase();
            }
        }

        // স্মুথ ওপেনিং ফাংশন
        function openLink(url) {
            webapp.HapticFeedback.impactOccurred('medium');
            
            const loader = document.getElementById('loader');
            const panel = document.getElementById('view-panel');
            const iframe = document.getElementById('app-iframe');

            // লোডার চালু
            loader.style.display = 'flex';

            setTimeout(() => {
                // লিংকে যাওয়ার আগে লোডার বন্ধ
                loader.style.display = 'none';
                
                // আইফ্রেম সেট করা
                iframe.src = url;
                
                // প্যানেল দেখানো এবং এনিমেশন দেওয়া
                panel.style.display = 'block';
                setTimeout(() => {
                    panel.classList.add('show');
                }, 50); // ছোট ডিলে যাতে ট্রানজিশন কাজ করে

                webapp.BackButton.show();
            }, 3000); // ৩ সেকেন্ড লোডিং
        }

        // ক্লোজ করার সময়ও স্মুথ ট্রানজিশন
        function closeLink() {
            const panel = document.getElementById('view-panel');
            panel.classList.remove('show');
            
            setTimeout(() => {
                panel.style.display = 'none';
                document.getElementById('app-iframe').src = "";
            }, 500); // CSS ট্রানজিশন শেষ হওয়ার সময়
            
            webapp.BackButton.hide();
        }

        webapp.BackButton.onClick(closeLink);
    </script>
</body>
</html>
